<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}augurd{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
  <nav>
    <div style="display:flex; flex-direction:column; gap:0.25rem;">
      <div style="display:flex; align-items:center; gap:0.75rem;">
        <a class="brand" href="/">&#9656; augurd</a>
        <span class="brand-sub">AI-powered log monitor</span>
        {% set new_ver, new_url = update_available() %}
        {% if new_ver %}
        <a href="{{ new_url }}" target="_blank" rel="noopener"
           style="font-size:0.72rem; padding:0.15rem 0.5rem; border-radius:4px;
                  background:var(--pico-ins-color); color:#000; text-decoration:none; font-weight:600;">
          v{{ new_ver }} available ↗
        </a>
        {% else %}
        <span style="font-size:0.72rem; color:var(--aug-muted);">v{{ app_version }}</span>
        {% endif %}
      </div>
      <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/settings">Settings</a>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
