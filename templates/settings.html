{% extends "base.html" %}
{% block title %}Settings — Augurd{% endblock %}

{% block content %}
<h3>Settings</h3>

<form method="post" action="/settings">
  <div class="settings-grid">

    <!-- Left: all knobs -->
    <div>
      <p class="settings-section-label">Discord</p>
      <label>
        Webhook URL
        <input type="url" name="discord_webhook_url"
               value="{{ settings.discord_webhook_url }}"
               placeholder="https://discord.com/api/webhooks/…">
      </label>

      <p class="settings-section-label">Ollama</p>
      <label>
        URL
        <input type="url" name="ollama_url"
               value="{{ settings.ollama_url }}"
               placeholder="http://localhost:11434">
      </label>
      <label>
        Model
        {% if models %}
        <select name="ollama_model">
          {% for m in models %}
          <option value="{{ m }}" {% if m == settings.ollama_model %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>
        {% else %}
        <input type="text" name="ollama_model"
               value="{{ settings.ollama_model }}"
               placeholder="Could not reach Ollama — enter manually">
        {% endif %}
      </label>

      <p class="settings-section-label">Buffering &amp; Alerts</p>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:0.75rem;">
        <label>
          Buffer Lines
          <input type="number" name="buffer_lines" value="{{ settings.buffer_lines }}" min="1" max="500">
          <small>flush after N lines</small>
        </label>
        <label>
          Buffer Seconds
          <input type="number" name="buffer_seconds" value="{{ settings.buffer_seconds }}" min="5" max="600">
          <small>flush after N seconds</small>
        </label>
        <label>
          Cooldown (min)
          <input type="number" name="alert_cooldown_minutes" value="{{ settings.alert_cooldown_minutes }}" min="0" max="1440">
          <small>min between alerts</small>
        </label>
      </div>
    </div>

    <!-- Right: prompt -->
    <div>
      <p class="settings-section-label">Analysis Prompt</p>
      <p style="color:var(--pico-muted-color); margin-bottom:0.5rem;">
        Required placeholders: <code>{server_name}</code> <code>{source}</code> <code>{log_text}</code><br>
        Add context here to reduce false positives.
      </p>
      <textarea name="analysis_prompt" rows="20"
                style="font-family:monospace; resize:vertical; width:100%;">{{ settings.analysis_prompt }}</textarea>
    </div>

  </div>

  <button type="submit" style="margin-top:1rem;">Save Settings</button>
</form>
{% endblock %}
